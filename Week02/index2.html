<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Time Table</title>
    <style>
        table,th,td {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div>
        <table >
            <tr>
                <th>EAD</th>
                <th>MP-I</th>
                <th>DBMS</th>
            </tr>
            <tr>
                <td>9:00 - 10:00</td>
                <td>10:00 - 11:00</td>
                <td>11:00 - 12:00</td>
            </tr>
        </table>
    </div>
</body>

</html>
