<!DOCTYPE html>
<html>
<head>
    <title>Position Example</title>
    <style>
        .box {
            width: 120px;
            height: 120px;
            color: white;
            text-align: center;
            line-height: 120px;
            font-weight: bold;
        }
        .static-box {
            background-color: blue;
            position: static;
        }
        .relative-box {
            background-color: green;
            position: relative;
            top: 20px;
            left: 30px;
        }
        .absolute-box {
            background-color: red;
            position: absolute;
            top: 50px;
            right: 50px;
        }
    </style>
</head>

<body>
    <div class="box static-box">Static</div>
    <div class="box relative-box">Relative</div>
    <div class="box absolute-box">Absolute</div>
</body>
</html>
