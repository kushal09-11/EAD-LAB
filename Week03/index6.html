<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Example</title>
    <style>
        .container{
            display: flex;              
            justify-content: center;    
            align-items: center;        
            gap: 20px;                  
            height: 100vh;
            background-color: #f2f2f2;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color: teal;
            color: white;
            display: flex;   
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </div>
</body>
</html>
