<!DOCTYPE html>
<html>
<head>
    <title>Simple Navbar</title>

    <style>
        ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
            background-color: #333;
        }
        li{
            display: inline;
        }
        li a{
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: inline-block;
        }
        li a:hover{
            background-color: #555;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>

</body>
</html>
