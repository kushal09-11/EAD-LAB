<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container">
    <div class="row">
      <div class="col-12">
        <h2 class="text-center">Student Registration Form</h2>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-12">
        <form onsubmit="showMessage(event)">

          <div>
            <label for="name" class="form-label">Student Name</label>
            <input type="text" class="form-control" id="name" placeholder="Enter your name">
          </div>

          <div>
            <label for="roll" class="form-label">Roll Number</label>
            <input type="text" class="form-control" id="roll" placeholder="Enter roll number">
          </div>

          <div>
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter email">
          </div>

          <div>
            <label class="form-label">Gender</label><br>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" id="male">
              <label class="form-check-label" for="male">Male</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" id="female">
              <label class="form-check-label" for="female">Female</label>
            </div>
          </div>

          <div>
            <label for="department" class="form-label">Department</label>
            <select class="form-select" id="department">
              <option selected>Select Department</option>
              <option>IT</option>
              <option>CSE</option>
              <option>AIDS</option>
              <option>CSM</option>
            </select>
          </div>

          <div>
            <label class="form-label">Subjects</label>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="math">
              <label class="form-check-label" for="math">EAD</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="physics">
              <label class="form-check-label" for="physics">Data Mining</label>
            </div>

            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="computer">
              <label class="form-check-label" for="computer">DBMS</label>
            </div>
          </div>

          <div>
            <label for="photo" class="form-label">Upload Photo</label>
            <input class="form-control" type="file" id="photo">
          </div>

          <button type="submit" class="btn btn-primary">Submit</button>
          <button type="reset" class="btn btn-secondary">Reset</button>

        </form>

        <div id="successMsg" class="alert alert-success d-none" role="alert">
          Student registration submitted successfully!
        </div>
      </div>
    </div>
  </div>

  <script>
    function showMessage(event) {
      event.preventDefault();
      document.getElementById("successMsg").classList.remove("d-none");
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
